<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#0E1428}
body{min-height:100vh;padding:22px 28px;color:#fff;font-family:var(--font-display)}
.row{display:flex;align-items:center;gap:14px;padding:6px 0}
.n{font-family:var(--font-mono);font-size:12px;color:rgba(255,255,255,0.5);width:44px}
.bar{height:10px;background:linear-gradient(90deg,#00BFA5,#00FF88);border-radius:5px;box-shadow:0 0 12px rgba(0,255,136,0.35)}
.px{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.45);margin-left:auto}
.mark{color:#00FF88;font-weight:700}
</style></head><body>
  <div class="row"><div class="n">1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="n">2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="n mark">3 ◆</div><div class="bar" style="width:13px;box-shadow:0 0 18px rgba(0,255,136,0.6)"></div><div class="px mark">13px · non-negotiable vertical</div></div>
  <div class="row"><div class="n">4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="n">5</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="n mark">6 ◆</div><div class="bar" style="width:30px;box-shadow:0 0 18px rgba(0,255,136,0.6)"></div><div class="px mark">30px · non-negotiable horizontal</div></div>
  <div class="row"><div class="n">7</div><div class="bar" style="width:40px"></div><div class="px">40px</div></div>
  <div class="row"><div class="n">8</div><div class="bar" style="width:56px"></div><div class="px">56px</div></div>
</body></html>
