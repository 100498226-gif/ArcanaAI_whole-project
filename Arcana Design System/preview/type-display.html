<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#080C1A}
body{min-height:100vh;padding:22px 28px;font-family:var(--font-display)}
.row{display:flex;align-items:baseline;gap:18px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.row:last-child{border-bottom:0}
.label{width:90px;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,0.38);font-weight:500}
.spec{color:#fff;font-weight:800;letter-spacing:-0.015em;line-height:1}
.meta{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.4)}
</style></head><body>
  <div class="row"><div class="label">Display</div><div class="spec" style="font-size:56px">El futuro está</div><div class="meta">96 / 800</div></div>
  <div class="row"><div class="label">H1</div><div class="spec" style="font-size:40px">Precisión</div><div class="meta">64 / 800</div></div>
  <div class="row"><div class="label">H2</div><div class="spec" style="font-size:28px">Profundidad</div><div class="meta">44 / 700</div></div>
  <div class="row"><div class="label">H3</div><div class="spec" style="font-size:20px;font-weight:700">Formas Orgánicas</div><div class="meta">30 / 700</div></div>
  <div class="row"><div class="label">H4</div><div class="spec" style="font-size:16px;font-weight:600">Retroalimentación</div><div class="meta">22 / 600</div></div>
</body></html>
