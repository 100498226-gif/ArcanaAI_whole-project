<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#080C1A}
body{min-height:100vh;padding:28px;display:flex;gap:18px;align-items:center;justify-content:center;font-family:var(--font-display);color:#fff}
.c{width:160px;height:130px;background:#141C35;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:1px solid rgba(255,255,255,0.06);position:relative}
.c.sm{box-shadow:0 0 12px rgba(0,255,136,0.35)}
.c.md{box-shadow:0 0 24px rgba(0,255,136,0.45), 0 0 48px rgba(0,191,165,0.2)}
.c.lg{box-shadow:0 0 40px rgba(0,255,136,0.55), 0 0 80px rgba(0,191,165,0.25)}
.c.teal{box-shadow:0 0 24px rgba(0,191,165,0.45)}
.t{font-size:13px;font-weight:700}
.s{font-family:var(--font-mono);font-size:10.5px;color:rgba(255,255,255,0.55)}
</style></head><body>
  <div class="c sm"><div class="t">sm</div><div class="s">12px fluorescent</div></div>
  <div class="c md"><div class="t">md</div><div class="s">24 + 48 halo</div></div>
  <div class="c lg"><div class="t">lg</div><div class="s">40 + 80 halo</div></div>
  <div class="c teal"><div class="t">teal</div><div class="s">24 turquesa</div></div>
</body></html>
