<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#0E1428;font-family:var(--font-display)}
body{min-height:100vh;padding:18px 22px}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sw{
  height:160px;border-radius:18px;display:flex;flex-direction:column;justify-content:space-between;
  padding:14px 16px;color:#0B1020;position:relative;overflow:hidden;
  border:1px solid rgba(11,16,32,0.06);
  box-shadow:0 8px 28px rgba(0,0,0,0.35);
}
.name{font-weight:700;font-size:14px}
.meta{font-size:11px;opacity:.65}
.hex{font-family:var(--font-mono);font-size:12px;opacity:.85}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#FFFFFF"><div><div class="name">Dawn</div><div class="meta">foreground panels</div></div><div class="hex">#FFFFFF</div></div>
    <div class="sw" style="background:#FAFBFD"><div><div class="name">Horizon</div><div class="meta">body background</div></div><div class="hex">#FAFBFD</div></div>
    <div class="sw" style="background:#F5F7FA"><div><div class="name">Cloud</div><div class="meta">subtle zones</div></div><div class="hex">#F5F7FA</div></div>
    <div class="sw" style="background:#EEF2F7"><div><div class="name">Mist</div><div class="meta">dividers · rest</div></div><div class="hex">#EEF2F7</div></div>
  </div>
</body></html>
