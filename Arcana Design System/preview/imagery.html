<!DOCTYPE html><html><head>
<meta charset="utf-8">
<style>
html,body{margin:0;padding:0;background:#080C1A}
body{min-height:100vh;padding:18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.tile{height:180px;border-radius:14px;overflow:hidden;background:#141C35;position:relative}
.tile img{width:100%;height:100%;object-fit:cover;display:block}
.cap{position:absolute;bottom:8px;left:10px;right:10px;font:600 10px/1.1 'Manrope',sans-serif;color:#fff;text-transform:uppercase;letter-spacing:.12em;text-shadow:0 1px 6px rgba(0,0,0,.6)}
</style></head><body>
  <div class="tile"><img src="../assets/nebula-green.png"><div class="cap">Formas Orgánicas</div></div>
  <div class="tile"><img src="../assets/pulse-green.png"><div class="cap">Pulsing Synthesis</div></div>
  <div class="tile"><img src="../assets/cosmic-eclipse.png"><div class="cap">Cosmic Eclipse</div></div>
</body></html>
