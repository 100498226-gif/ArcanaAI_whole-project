<!DOCTYPE html><html><head>
<meta charset="utf-8">
<style>
html,body{margin:0;padding:0}
body{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;gap:0;font-family:'Manrope',sans-serif}
.bg{height:220px;padding:22px;display:flex;align-items:flex-end;color:#fff}
.dark{background:
  radial-gradient(ellipse 420px 320px at 20% 10%, rgba(0,191,165,0.22) 0%, transparent 60%),
  radial-gradient(ellipse 380px 280px at 80% 90%, rgba(0,255,136,0.16) 0%, transparent 65%),
  #080C1A;
}
.light{background:
  radial-gradient(ellipse 420px 320px at 20% 10%, rgba(0,191,165,0.1) 0%, transparent 60%),
  radial-gradient(ellipse 380px 280px at 80% 90%, rgba(0,255,136,0.08) 0%, transparent 65%),
  #FFFFFF;
  color:#0B1020;
}
.tag{font:700 12px 'Manrope',sans-serif;letter-spacing:.12em;text-transform:uppercase}
</style></head><body>
  <div class="bg dark"><div class="tag">Cosmic Depths · radial teal/fluor</div></div>
  <div class="bg light"><div class="tag">Stellar Atmosphere · soft radial</div></div>
</body></html>
