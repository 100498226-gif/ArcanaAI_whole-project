<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#FAFBFD}
body{min-height:100vh;padding:26px 40px;font-family:var(--font-display);color:#0B1020}
.row{display:flex;align-items:center;gap:18px;margin-bottom:16px}
.lbl{font-size:12px;color:rgba(11,16,32,0.55);min-width:120px;font-weight:500}
.track{flex:1;height:6px;background:#EEF2F7;border-radius:3px;position:relative}
.fill{position:absolute;top:0;left:0;height:100%;border-radius:3px;background:linear-gradient(90deg,#00BFA5,#00FF88);box-shadow:0 0 12px rgba(0,255,136,0.5)}
.thumb{position:absolute;top:-7px;width:20px;height:20px;border-radius:50%;background:#00BFA5;border:3px solid #fff;box-shadow:0 0 0 4px rgba(0,191,165,0.18), 0 0 18px rgba(0,255,136,0.5)}
.val{font-family:var(--font-mono);font-size:12px;color:#00BFA5;font-weight:700;min-width:40px;text-align:right}
</style></head><body>
  <div class="row">
    <span class="lbl">Límite de uso</span>
    <div class="track"><div class="fill" style="width:62%"></div><div class="thumb" style="left:calc(62% - 10px)"></div></div>
    <span class="val">62%</span>
  </div>
  <div class="row">
    <span class="lbl">Radio de búsqueda</span>
    <div class="track"><div class="fill" style="width:28%"></div><div class="thumb" style="left:calc(28% - 10px)"></div></div>
    <span class="val">28%</span>
  </div>
</body></html>
