<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#FAFBFD}
body{min-height:100vh;padding:30px;display:flex;flex-direction:column;gap:18px;align-items:flex-start;font-family:var(--font-display);color:#0B1020}
.seg{display:inline-flex;background:#fff;border:1px solid rgba(11,16,32,0.08);border-radius:999px;padding:4px;box-shadow:0 4px 16px rgba(11,16,32,0.06)}
.seg button{background:transparent;border:none;padding:10px 22px;font:600 13px var(--font-display);color:rgba(11,16,32,0.65);border-radius:999px;cursor:pointer;letter-spacing:.02em}
.seg button.active{background:linear-gradient(135deg,#00BFA5 0%,#00FF88 100%);color:#001108;box-shadow:0 0 18px rgba(0,255,136,0.3)}
.lbl{font-size:11px;color:rgba(11,16,32,0.4);text-transform:uppercase;letter-spacing:.14em;font-weight:600}
</style></head><body>
  <div class="lbl">Plan · PDF page 14</div>
  <div class="seg">
    <button>Mensual</button>
    <button class="active">Anual</button>
    <button>De por vida</button>
  </div>
</body></html>
