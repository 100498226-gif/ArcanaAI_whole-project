<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#FAFBFD;font-family:var(--font-display)}
body{min-height:100vh;padding:18px 22px}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sw{
  height:160px;border-radius:18px;display:flex;flex-direction:column;justify-content:space-between;
  padding:14px 16px;color:#fff;position:relative;overflow:hidden;
}
.sw::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 240px 160px at 80% 120%, rgba(0,255,136,0.12) 0%, transparent 60%);
  pointer-events:none;
}
.name{font-weight:700;font-size:14px;letter-spacing:.02em;z-index:1;position:relative}
.meta{font-size:11px;opacity:.72;letter-spacing:.04em;z-index:1;position:relative}
.hex{font-family:var(--font-mono);font-size:12px;opacity:.9;z-index:1;position:relative}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#080C1A"><div><div class="name">Void</div><div class="meta">app background</div></div><div class="hex">#080C1A</div></div>
    <div class="sw" style="background:#0E1428"><div><div class="name">Deep</div><div class="meta">panels</div></div><div class="hex">#0E1428</div></div>
    <div class="sw" style="background:#141C35"><div><div class="name">Nebula</div><div class="meta">elevated cards</div></div><div class="hex">#141C35</div></div>
    <div class="sw" style="background:#1E2A4A"><div><div class="name">Dust</div><div class="meta">hover · selected</div></div><div class="hex">#1E2A4A</div></div>
  </div>
</body></html>
