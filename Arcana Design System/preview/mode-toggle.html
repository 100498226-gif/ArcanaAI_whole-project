<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#080C1A}
body{min-height:100vh;padding:26px;display:flex;gap:40px;align-items:center;font-family:var(--font-display);color:#fff}
.grp{display:flex;align-items:center;gap:12px}
.lbl{font-size:12px;color:rgba(255,255,255,0.65);font-weight:500;letter-spacing:.04em}
.toggle{position:relative;width:56px;height:30px;border-radius:999px;background:#141C35;border:1px solid rgba(255,255,255,0.1);cursor:pointer}
.toggle .thumb{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.6);transition:all .25s}
.toggle.on{background:linear-gradient(135deg,#00BFA5 0%,#00FF88 100%);border-color:transparent;box-shadow:0 0 20px rgba(0,255,136,0.45)}
.toggle.on .thumb{left:30px;background:#001108;box-shadow:0 0 12px rgba(255,255,255,0.6)}
.state{font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:.14em;font-weight:600}
.state.on{color:#00FF88}
</style></head><body>
  <div class="grp"><span class="lbl">Modo</span><div class="toggle"><div class="thumb"></div></div><span class="state">Offline</span></div>
  <div class="grp"><span class="lbl">Modo</span><div class="toggle on"><div class="thumb"></div></div><span class="state on">Online</span></div>
</body></html>
