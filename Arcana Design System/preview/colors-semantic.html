<!DOCTYPE html><html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#0E1428;font-family:var(--font-display)}
body{min-height:100vh;padding:22px;display:flex;gap:14px;flex-wrap:wrap}
.sw{flex:1;min-width:140px;height:110px;border-radius:16px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;position:relative}
.name{font-weight:700;font-size:13px}
.role{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:.08em}
.hex{font-family:var(--font-mono);font-size:11.5px;opacity:.95}
</style></head><body>
  <div class="sw" style="background:#00FF88;color:#001108"><div><div class="name">Success</div><div class="role">online · ingested</div></div><div class="hex">#00FF88</div></div>
  <div class="sw" style="background:#FFB020;color:#231500"><div><div class="name">Warning</div><div class="role">review · pending</div></div><div class="hex">#FFB020</div></div>
  <div class="sw" style="background:#FF5A6E"><div><div class="name">Danger</div><div class="role">offline · blocked</div></div><div class="hex">#FF5A6E</div></div>
  <div class="sw" style="background:#5BB8FF;color:#001B2E"><div><div class="name">Info</div><div class="role">neutral state</div></div><div class="hex">#5BB8FF</div></div>
</body></html>
