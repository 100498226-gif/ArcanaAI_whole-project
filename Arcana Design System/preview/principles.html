<!DOCTYPE html><html><head>
<meta charset="utf-8">
<style>
html,body{margin:0;padding:0;background:#080C1A;font-family:'Manrope',sans-serif}
body{min-height:100vh;padding:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.p{
  background:#0E1428;border:1px solid rgba(255,255,255,0.06);border-radius:16px;
  padding:16px 14px;color:#fff;display:flex;flex-direction:column;gap:6px;
  position:relative;overflow:hidden;
}
.p::before{
  content:"";position:absolute;inset:-1px;border-radius:17px;
  background:radial-gradient(ellipse 120px 80px at 50% 0%, rgba(0,255,136,0.2), transparent 70%);
  pointer-events:none;
}
.num{font:700 11px 'JetBrains Mono',monospace;color:#00FF88;letter-spacing:.1em;position:relative}
.t{font-size:13px;font-weight:700;line-height:1.2;position:relative}
.d{font-size:10.5px;line-height:1.4;color:rgba(255,255,255,0.55);position:relative}
</style></head><body>
  <div class="p"><div class="num">01</div><div class="t">Formas Orgánicas</div><div class="d">Nebulae replace rigid grids.</div></div>
  <div class="p"><div class="num">02</div><div class="t">Profundidad Cósmica</div><div class="d">Space defined by light, not lines.</div></div>
  <div class="p"><div class="num">03</div><div class="t">Precisión Matemática</div><div class="d">13px / 30px padding inegociable.</div></div>
  <div class="p"><div class="num">04</div><div class="t">Retroalimentación Energética</div><div class="d">Fluorescent green hover = active state.</div></div>
</body></html>
